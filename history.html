<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RETINA AI Geçmiş</title><meta name="theme-color" content="#020617"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="assets/icon.svg" type="image/svg+xml"><link rel="stylesheet" href="css/style.css"></head><body><div class="page-shell"><div class="app-bar clean-navbar"><a class="brand-link" href="index.html">RETINA AI</a><nav class="unified-menu"><a href="index.html">Canlı Analiz</a><a href="dashboard.html">Dashboard</a><a href="history.html" class="active">Geçmiş</a><a href="exercises.html">Egzersizler</a><a href="report.html">Rapor</a></nav></div><main class="page-container"><section class="page-hero"><div class="page-eyebrow">Seans Geçmişi</div><h1>Ölçüm kayıtları</h1><p>Kaydedilen son 100 seansı burada görürsün. Kayıtlar tarayıcı localStorage içinde saklanır.</p></section><section class="panel-card"><div class="panel-title"><h2>Geçmiş</h2><button class="action-btn" id="clear-history">Geçmişi Temizle</button></div><div class="history-list" id="history-list"></div></section></main></div><script src="js/pages.js"></script><script>const R=RetinaPages;function render(){const list=document.getElementById('history-list'),items=R.sessions();if(!items.length){list.innerHTML='<div class="empty-state">Henüz kayıtlı seans yok.</div>';return;}list.innerHTML=items.map(s=>`<article class="history-row"><div><strong>${R.date(s.savedAt)}</strong><br><small>${s.note||s.activeMode||'RETINA AI seansı'}</small></div><div>Skor<br><strong>${s.score||100}</strong></div><div>Süre<br><strong>${R.fmt(s.totalTime)}</strong></div><div>Doğru<br><strong>${R.fmt(s.totalGood)}</strong></div><div>İhlal<br><strong>${s.breaks||0}</strong></div></article>`).join('');}render();document.getElementById('clear-history').onclick=()=>{if(confirm('Tüm seans geçmişi temizlensin mi?')){localStorage.removeItem(R.STORE.sessions);render();}};</script></body></html>
