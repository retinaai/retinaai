<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RETINA AI Dashboard</title><meta name="theme-color" content="#020617"><link rel="manifest" href="manifest.webmanifest"><link rel="icon" href="assets/icon.svg" type="image/svg+xml"><link rel="stylesheet" href="css/style.css"></head><body><div class="page-shell"><div class="app-bar clean-navbar"><a class="brand-link" href="index.html">RETINA AI</a><nav class="unified-menu"><a href="index.html">Canlı Analiz</a><a href="dashboard.html" class="active">Dashboard</a><a href="history.html">Geçmiş</a><a href="exercises.html">Egzersizler</a><a href="report.html">Rapor</a></nav></div><main class="page-container"><section class="page-hero"><div class="page-eyebrow">Smart Coach Dashboard</div><h1>Gelişim paneli</h1><p>Canlı analizden kaydedilen seansları, genel skoru, doğru/hatalı form sürelerini ve en sık hataları burada takip edebilirsin.</p></section><section class="card-grid" id="dash-cards"></section><section class="panel-card"><div class="panel-title"><h2>Mod Bazlı Performans</h2><a class="action-btn" href="index.html">Canlı Analize Dön</a></div><table class="simple-table"><thead><tr><th>Mod</th><th>Skor</th><th>Doğru</th><th>Hatalı</th><th>İhlal</th></tr></thead><tbody id="mode-table"></tbody></table></section><section class="panel-card"><div class="panel-title"><h2>Kişisel Öneri</h2></div><div id="advice-list"></div></section></main></div><script src="js/pages.js"></script><script>const R=RetinaPages,s=R.latest();const cards=document.getElementById('dash-cards');if(!s){cards.innerHTML='<div class="empty-state" style="grid-column:1/-1">Henüz kayıtlı seans yok. Canlı analiz ekranında seansı kaydet.</div>';}else{cards.innerHTML=`<div class="dashboard-card"><strong>Genel Skor</strong><span>${s.score||100}</span></div><div class="dashboard-card"><strong>Toplam Süre</strong><span>${R.fmt(s.totalTime)}</span></div><div class="dashboard-card"><strong>Doğru Form</strong><span>${R.fmt(s.totalGood)}</span></div><div class="dashboard-card"><strong>İhlal</strong><span>${s.breaks||0}</span></div>`;document.getElementById('mode-table').innerHTML=Object.entries(s.modes||{}).map(([k,d])=>`<tr><td>${R.plans[k]||k}</td><td><div class="progress-line"><span style="width:${d.score||0}%"></span></div> ${d.score||0}/100</td><td>${R.fmt(d.good)}</td><td>${R.fmt(d.bad)}</td><td>${d.breaks||0}</td></tr>`).join('');document.getElementById('advice-list').innerHTML='<ul>'+R.advice(s.topError).map(a=>`<li>${a}</li>`).join('')+'</ul>';}</script></body></html>
